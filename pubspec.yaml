name: kids_finance
description: Android app for kids' financial literacy with three buckets (Money, Investments, Charity)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.3.1

  # Routing
  go_router: ^17.2.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0
  firebase_crashlytics: ^5.1.0

  # Data Models
  equatable: ^2.0.5

  # UI & Design
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  bcrypt: ^1.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  fake_cloud_firestore: ^4.1.0+1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

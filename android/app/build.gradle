plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.kidsfinance.app"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId = "com.kidsfinance.app"
        // Firebase Auth requires minSdk >= 21. Set explicitly rather than
        // deferring to flutter.minSdkVersion, which resolves to 16 on older
        // Flutter installations.
        minSdkVersion 21
        targetSdk = 34
        versionCode = 1
        versionName = "1.0.0"
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
     // Import the Firebase BoM
  implementation platform('com.google.firebase:firebase-bom:34.11.0')
  implementation 'com.google.firebase:firebase-analytics'
}
